<div class="page">
  <header class="header">
    <span class="header-title">Vega-Lite Chart Preview</span>
    <span class="header-sub">Paste a spec on the left — chart renders on the right</span>
  </header>

  <div class="panels">
    <!-- Left panel: spec input -->
    <div class="panel panel-left">
      <div class="panel-header">
        <span class="panel-label">Vega-Lite Specification (JSON)</span>
        <button class="btn-clear" (click)="clearSpec()" [disabled]="!specText">Clear</button>
      </div>
      <textarea
        class="spec-input"
        [(ngModel)]="specText"
        (ngModelChange)="onSpecChange()"
        placeholder='Paste your Vega-Lite v5 spec here, e.g.&#10;{&#10;  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",&#10;  "mark": "bar",&#10;  "data": { "values": [...] },&#10;  "encoding": { ... }&#10;}'
        spellcheck="false"
        autocomplete="off"
      ></textarea>
      @if (errorMessage) {
        <div class="error-bar">{{ errorMessage }}</div>
      }
    </div>

    <div class="divider"></div>

    <!-- Right panel: chart output -->
    <div class="panel panel-right">
      <div class="panel-header">
        <span class="panel-label">Chart Preview</span>
        @if (chartReady) {
          <span class="badge-ok">Rendered</span>
        }
      </div>
      <div class="chart-area">
        @if (!chartReady && !errorMessage) {
          <div class="placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
            </svg>
            <p>Chart will appear here</p>
          </div>
        }
        <div #chartContainer class="vega-container"></div>
      </div>
    </div>
  </div>
</div>
